---
# Test Job to verify GCS access from K8s cluster
# This job tests:
# 1. GCS connectivity
# 2. Ability to list vt-file-feeder-by-date bucket
# 3. Download a sample file
# 4. Python dependencies installation
#
# Deploy:
#   kubectl apply -f test-gcs-access-job.yaml
#
# Check logs:
#   kubectl logs -f job/test-gcs-access -n stgbusybox
#
# Cleanup:
#   kubectl delete job test-gcs-access -n stgbusybox

apiVersion: batch/v1
kind: Job
metadata:
  name: test-gcs-access
  namespace: stgbusybox  # Use existing namespace with network access
spec:
  # Don't retry on failure - we want to see the error
  backoffLimit: 0
  
  # Clean up after 1 hour
  ttlSecondsAfterFinished: 3600
  
  template:
    metadata:
      labels:
        app: test-gcs-access
    
    spec:
      restartPolicy: Never
      
      containers:
      - name: gcs-test
        image: google/cloud-sdk:slim
        
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          echo "=== GCS Access Test from K8s ==="
          date
          echo ""
          
          # 1. Test DNS resolution
          echo "[1/6] Testing DNS resolution..."
          if nslookup storage.googleapis.com; then
            echo "  ✓ DNS resolution works"
          else
            echo "  ❌ DNS resolution failed"
            exit 1
          fi
          echo ""
          
          # 2. Test HTTPS connectivity
          echo "[2/6] Testing HTTPS connectivity to GCS..."
          if curl -s -o /dev/null -w "%{http_code}" https://storage.googleapis.com | grep -q "200\|403\|401"; then
            echo "  ✓ HTTPS connection successful"
          else
            echo "  ❌ Cannot connect to GCS"
            exit 1
          fi
          echo ""
          
          # 3. Check for GCP credentials
          echo "[3/6] Checking GCP credentials..."
          if [ -f "/var/run/secrets/cloud.google.com/service-account.json" ]; then
            echo "  ✓ Workload Identity service account found"
            export GOOGLE_APPLICATION_CREDENTIALS="/var/run/secrets/cloud.google.com/service-account.json"
            gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
          elif gcloud auth list 2>&1 | grep -q "ACTIVE"; then
            echo "  ✓ GCP auth already configured"
          else
            echo "  ⚠️  No GCP credentials found"
            echo "  Will try anonymous access (public buckets only)"
          fi
          echo ""
          
          # 4. Test gsutil ls on the bucket
          echo "[4/6] Testing gsutil access to vt-file-feeder-by-date..."
          BUCKET="gs://vt-file-feeder-by-date"
          
          if gsutil ls "$BUCKET/" | head -5; then
            echo "  ✓ Bucket listing successful"
            echo ""
            echo "  Available dates:"
            gsutil ls "$BUCKET/" | grep -E '20[0-9]{2}-[0-9]{2}-[0-9]{2}' | head -10
          else
            echo "  ❌ Cannot list bucket"
            echo "  Error: $?"
            exit 1
          fi
          echo ""
          
          # 5. Try to download a small test file (if exists)
          echo "[5/6] Testing file download..."
          # Get the most recent date folder
          LATEST_DATE=$(gsutil ls "$BUCKET/" | grep -E '20[0-9]{2}-[0-9]{2}-[0-9]{2}' | tail -1)
          
          if [ -n "$LATEST_DATE" ]; then
            echo "  Latest date folder: $LATEST_DATE"
            
            # List files in that date
            echo "  Files in latest date:"
            gsutil ls "$LATEST_DATE" | head -3
            
            # Try to get size of first file (not download, just stat)
            FIRST_FILE=$(gsutil ls "$LATEST_DATE" | head -1)
            if [ -n "$FIRST_FILE" ]; then
              echo ""
              echo "  Testing gsutil stat on: $FIRST_FILE"
              if gsutil stat "$FIRST_FILE"; then
                echo "  ✓ File access successful"
              else
                echo "  ❌ Cannot access file"
                exit 1
              fi
            fi
          else
            echo "  ⚠️  No date folders found"
          fi
          echo ""
          
          # 6. Test Python dependencies
          echo "[6/6] Testing Python dependencies..."
          pip3 install -q google-cloud-storage pyarrow 2>&1 | head -20
          
          if python3 -c "from google.cloud import storage; print('✓ google-cloud-storage imported')"; then
            echo "  ✓ Python GCS library works"
          else
            echo "  ❌ Python GCS library failed"
            exit 1
          fi
          
          if python3 -c "import pyarrow; print('✓ pyarrow imported')"; then
            echo "  ✓ PyArrow works"
          else
            echo "  ❌ PyArrow failed"
            exit 1
          fi
          echo ""
          
          # Summary
          echo "=== Test Complete ==="
          echo "✅ All checks passed!"
          echo ""
          echo "GCS bucket is accessible from K8s cluster"
          echo "Ready to deploy VT incremental import CronJob"
          date
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        
        # Optional: Mount GCP service account if available
        # volumeMounts:
        # - name: gcp-sa
        #   mountPath: /var/run/secrets/cloud.google.com
        #   readOnly: true
      
      # Optional: GCP service account volume
      # volumes:
      # - name: gcp-sa
      #   secret:
      #     secretName: gcp-service-account
