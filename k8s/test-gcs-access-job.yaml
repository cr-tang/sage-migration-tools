---
# Simplified GCS access test
# Tests basic connectivity and Python library access to GCS
apiVersion: batch/v1
kind: Job
metadata:
  name: test-gcs-access
  namespace: stgbusybox
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  
  template:
    metadata:
      labels:
        app: test-gcs-access
    
    spec:
      restartPolicy: Never
      
      containers:
      - name: gcs-test
        image: python:3.11-slim
        
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          echo "=== GCS Access Test from K8s ==="
          date
          echo ""
          
          # Install dependencies
          echo "Installing dependencies..."
          apt-get update -qq 2>&1 | grep -v "Get:" || true
          apt-get install -y -qq curl < /dev/null > /dev/null 2>&1
          pip3 install -q google-cloud-storage 2>&1 | grep -v "Requirement\|Using cached" || true
          echo ""
          
          # 1. DNS
          echo "[1/4] Testing DNS..."
          if getent hosts storage.googleapis.com > /dev/null 2>&1; then
            echo "  ✓ DNS works"
          else
            echo "  ❌ DNS failed"
            exit 1
          fi
          
          # 2. HTTPS
          echo "[2/4] Testing HTTPS..."
          if curl -s -o /dev/null -w "%{http_code}" https://storage.googleapis.com | grep -q "200\|403\|401"; then
            echo "  ✓ HTTPS works"
          else
            echo "  ❌ HTTPS failed"
            exit 1
          fi
          
          # 3. Python GCS
          echo "[3/4] Testing Python GCS library..."
          python3 -c "
          from google.cloud import storage
          client = storage.Client.create_anonymous_client()
          bucket = client.bucket('vt-file-feeder-by-date')
          prefixes = list(bucket.list_blobs(max_results=5, delimiter='/').prefixes)
          print(f'  ✓ Found {len(prefixes)} date folders')
          if prefixes:
              latest = sorted(prefixes)[-1].rstrip('/')
              print(f'  Latest: {latest}')
          "
          
          # 4. File access
          echo "[4/4] Testing file access..."
          python3 -c "
          from google.cloud import storage
          client = storage.Client.create_anonymous_client()
          bucket = client.bucket('vt-file-feeder-by-date')
          prefixes = sorted(list(bucket.list_blobs(max_results=100, delimiter='/').prefixes))
          if prefixes:
              latest = prefixes[-1].rstrip('/')
              blobs = list(bucket.list_blobs(prefix=f'{latest}/', max_results=1))
              if blobs:
                  print(f'  ✓ File access OK ({blobs[0].size/(1024*1024):.1f} MB)')
              else:
                  print('  ⚠️  No files in latest folder')
          "
          
          echo ""
          echo "=== All Tests Passed ==="
          echo "✅ GCS is accessible from K8s"
          date
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
